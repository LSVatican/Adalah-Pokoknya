<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adalah Pokoknya</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Adalah Pokoknya</h1>
            <span class="subtitle">Multi-Account Manager</span>
        </header>

        <div class="current-profile" id="currentProfile">
            <p>Akun Aktif: <span id="activeEmail">Belum ada akun aktif</span></p>
        </div>

        <main class="account-section">
            <h3>Daftar Akun Terdaftar</h3>
            <div id="accountList" class="account-list">
                </div>
        </main>

        <button class="fab-btn" id="openEmailModal">+</button>

        <footer class="watermark">by Daus XD</footer>
    </div>

    <div class="modal" id="emailModal">
        <div class="modal-content">
            <h3>Masuk / Tambah Akun</h3>
            <p>Masukkan email Anda untuk menerima kode verifikasi.</p>
            <input type="email" id="emailInput" placeholder="nama@email.com" required>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('emailModal')">Batal</button>
                <button class="btn btn-primary" id="btnSendCode">Kirim Kode</button>
            </div>
        </div>
    </div>

    <div class="modal" id="codeModal">
        <div class="modal-content">
            <h3>Verifikasi Email</h3>
            <p>Kode verifikasi telah dikirim ke <br><b id="targetEmail"></b></p>
            <input type="text" id="codeInput" placeholder="Masukkan 6 Digit Kode" maxlength="6">
            <div class="resend-box">
                <span id="countdownText"></span>
                <button id="btnResend" class="btn-link" disabled>Minta Kode Lagi</button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('codeModal')">Batal</button>
                <button class="btn btn-primary" id="btnVerifyCode">Verifikasi</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
