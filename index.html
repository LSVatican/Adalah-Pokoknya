<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adalah Pokoknya</title>
    <link rel="icon" type="image/png" href="/favicon.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Adalah Pokoknya</h1>
            <p class="subtitle">Multi-Account Management System</p>
        </header>

        <main>
            <div class="account-section">
                <h3>Akun Terhubung</h3>
                <div id="accountList" class="account-list">
                    </div>
            </div>
        </main>

        <button id="btnOpenEmailModal" class="fab-btn" title="Tambah Akun">+</button>
    </div>

    <div id="emailModal" class="modal">
        <div class="modal-content">
            <h3>Masuk / Tambah Akun</h3>
            <p>Masukkan email Anda untuk menerima kode verifikasi.</p>
            <input type="email" id="inputEmail" placeholder="contoh@email.com" required>
            <div class="modal-actions">
                <button onclick="closeModal('emailModal')" class="btn-secondary">Batal</button>
                <button onclick="handleSendOTP()" id="btnSendOTP" class="btn-primary">Kirim Kode</button>
            </div>
        </div>
    </div>

    <div id="otpModal" class="modal">
        <div class="modal-content">
            <h3>Verifikasi Kode OTP</h3>
            <p>Kode telah dikirim ke <strong id="displayEmail"></strong></p>
            <input type="text" id="inputOTP" placeholder="Masukkan 6 Digit Kode" maxlength="6">
            <div class="modal-actions">
                <button onclick="requestCodeAgain()" class="btn-link">Minta Kode Lagi</button>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('otpModal')" class="btn-secondary">Batal</button>
                <button onclick="handleVerifyOTP()" class="btn-primary">Verifikasi</button>
            </div>
        </div>
    </div>

    <div class="watermark">by Daus XD</div>

    <script src="script.js"></script>
</body>
</html>
