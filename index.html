<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adalah Pokoknya</title>
    <link rel="icon" type="image/png" href="/favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Adalah Pokoknya</h1>
            <p class="subtitle">Multi-Account Management System</p>
        </header>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="togglePopup('login-popup', true)">
                <i class="fas fa-user-plus"></i> Tambah / Hubungkan Akun
            </button>
        </div>

        <main class="account-section">
            <h3><i class="fas fa-users-cog"></i> Sesi Akun Aktif</h3>
            <div id="account-list" class="account-list">
                <div class="empty-state">Belum ada akun yang terhubung.</div>
            </div>
        </main>

        <footer>
            <p>by Daus XD</p>
        </footer>
    </div>

    <div id="login-popup" class="popup-overlay">
        <div class="popup-box animate-glow">
            <button class="close-btn" onclick="togglePopup('login-popup', false)">&times;</button>
            <h3>Pilih Metode Login</h3>
            <p>Hubungkan multi-akun Anda ke platform</p>
            
            <div class="login-options">
                <button class="btn-login google" onclick="loginWithGoogle()">
                    <i class="fab fa-google"></i> Masuk dengan Google
                </button>
                <button class="btn-login github" onclick="loginWithGithub()">
                    <i class="fab fa-github"></i> Masuk dengan GitHub
                </button>
                <button class="btn-login email" onclick="openEmailInput()">
                    <i class="fas fa-envelope"></i> Masuk dengan Email Link
                </button>
            </div>
        </div>
    </div>

    <div id="email-popup" class="popup-overlay">
        <div class="popup-box">
            <button class="close-btn" onclick="togglePopup('email-popup', false)">&times;</button>
            <h3>Masuk via Email Link</h3>
            <p>Link verifikasi akan dikirimkan langsung ke inbox email Anda.</p>
            
            <div class="form-group">
                <input type="email" id="email-input" placeholder="Masukkan alamat email aktif..." required>
                <button class="btn btn-submit" onclick="sendEmailVerificationLink()">
                    <i class="fas fa-paper-plane"></i> Kirim Link Verifikasi
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
